
# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# split panes using | and -
bind | split-window -c "#{pane_current_path}" -h
bind - split-window -c "#{pane_current_path}" -v

bind r source-file ~/.tmux.conf

# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D


# Enable mouse mode (tmux 2.1 and above)
set -g mouse on

#start indices at 1
set -g base-index 1
setw -g pane-base-index 1

set -g allow-passthrough on

# Plugins (tpm)
# `run '~/.tmux/plugins/tpm/tpm'` in ~/.tmux.conf so we can do per-machine overrides

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'wfxr/tmux-power'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-power, replaces powerline
set -g @tmux_power_theme 'gold'

%if "#{TMUX_POWER_NO_ICONS}"
set -g @tmux_power_left_a  '#{?client_prefix,#[reverse],}#S#[noreverse]'          # session name
set -g @tmux_power_left_b  ''
set -g @tmux_power_left_c  ''
set -g @tmux_power_left_d  ''
set -g @tmux_power_right_w '#(~/code/config/tmux/loadavg.sh)'
set -g @tmux_power_right_x '%F'         # date
set -g @tmux_power_right_y '%H:%M'         # time
set -g @tmux_power_right_z '#{USER}@#h'  # user@host
%else
set -g @tmux_power_left_a  '#{?client_prefix,#[reverse],}#S#[noreverse]'          # session name
set -g @tmux_power_left_b  ''
set -g @tmux_power_left_c  ''
set -g @tmux_power_left_d  ''
set -g @tmux_power_right_w '#(~/code/config/tmux/loadavg.sh)'
set -g @tmux_power_right_x '%F'         # date
set -g @tmux_power_right_y '%H:%M'         # time
set -g @tmux_power_right_z  '#{USER}@#h'  # user@host
%endif



# resurrect / continuum — session persistence
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
