if-shell 'command -v zsh >/dev/null' \
    'run-shell "tmux set-option -g default-shell \"\$(command -v zsh)\""'

set-option -g set-titles on
set -g terminal-overrides 'xterm*:smcup@:rmcup@'

# Shared tmux config from the roaming config
# Needs to be exactly source-file (not a run-shell wrapper) tpack can follow it
source-file ~/code/config/tmux/.tmux.conf

bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M

# Per-machine overrides go here
#   set -g @tmux_power_theme 'moon'

# Plugin manager needs to stay after any per-machine plugins
run 'PATH="$HOME/.local/bin:$PATH" tpack init'
